name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  WORKER_NAME: weight-tracker

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Create D1 Database (if not exists)
        id: create-d1
        run: |
          OUTPUT=$(npx wrangler d1 create ${{ env.WORKER_NAME }}-db 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "database_id"; then
            D1_ID=$(echo "$OUTPUT" | grep "database_id" | sed 's/.*= "\(.*\)"/\1/')
            echo "d1_id=$D1_ID" >> $GITHUB_OUTPUT
            echo "Created new D1 database: $D1_ID"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Get D1 Database ID
        id: get-d1
        run: |
          D1_ID="${{ secrets.D1_DATABASE_ID }}"
          if [ -z "$D1_ID" ] && [ -n "${{ steps.create-d1.outputs.d1_id }}" ]; then
            D1_ID="${{ steps.create-d1.outputs.d1_id }}"
          fi
          if [ -z "$D1_ID" ]; then
            D1_ID=$(npx wrangler d1 list --json 2>/dev/null | jq -r '.[] | select(.name=="${{ env.WORKER_NAME }}-db") | .uuid' || echo "")
          fi
          echo "d1_id=$D1_ID" >> $GITHUB_OUTPUT
          echo "D1 Database ID: $D1_ID"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Update wrangler.toml with D1 ID
        run: |
          D1_ID="${{ steps.get-d1.outputs.d1_id }}"
          if [ -n "$D1_ID" ]; then
            sed -i "s/database_id = \"YOUR_D1_DATABASE_ID\"/database_id = \"$D1_ID\"/" wrangler.toml
          else
            echo "::error::D1 Database ID not found. Please set D1_DATABASE_ID in GitHub Secrets."
            exit 1
          fi
          echo "Updated wrangler.toml:"
          cat wrangler.toml

      - name: Run D1 Migrations
        run: npx wrangler d1 migrations apply ${{ env.WORKER_NAME }}-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Secrets
        run: |
          if [ -n "${{ secrets.AI_API_KEY }}" ]; then
            echo "${{ secrets.AI_API_KEY }}" | npx wrangler secret put AI_API_KEY 2>/dev/null || true
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deployment Summary
        run: |
          echo "## Deployment Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Access URL" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ env.WORKER_NAME }}.<your-subdomain>.workers.dev" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources" >> $GITHUB_STEP_SUMMARY
          echo "- D1 Database: \`${{ steps.get-d1.outputs.d1_id }}\`" >> $GITHUB_STEP_SUMMARY
